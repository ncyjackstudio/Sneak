<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Snake</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: Consolas, monospace;
      color: #fff;
    }
    h1 {
      font-size: 2.5rem;
      color: #32c832;
      letter-spacing: 6px;
      margin-bottom: 10px;
    }
    #scoreboard {
      font-size: 1rem;
      margin-bottom: 12px;
      color: #aaa;
    }
    #scoreboard span { color: #fff; font-weight: bold; }
    canvas {
      border: 2px solid #222;
      background: #0a0a0a;
      display: block;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
    }
    #overlay.hidden { display: none; }
    #overlay h2 { font-size: 2rem; color: #e03232; }
    #overlay p  { color: #aaa; font-size: 0.95rem; }
    #overlay button {
      margin-top: 6px;
      padding: 10px 36px;
      background: #32c832;
      color: #000;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }
    #overlay button:hover { background: #28a828; }
    #hint { margin-top: 8px; font-size: 0.8rem; color: #444; }
  </style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="scoreboard">Score: <span id="score">0</span> &nbsp;|&nbsp; Best: <span id="best">0</span></div>
  <div style="position:relative;">
    <canvas id="c"></canvas>
    <div id="overlay">
      <h2 id="overlay-title">SNAKE</h2>
      <p id="overlay-msg">Use arrow keys or WASD to move</p>
      <button id="btn">PLAY</button>
    </div>
  </div>
  <div id="hint">ESC — pause &nbsp;|&nbsp; Arrow keys / WASD — move</div>

<script>
const TILE = 20, COLS = 30, ROWS = 24;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width  = COLS * TILE;
canvas.height = ROWS * TILE;

const overlay      = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlayMsg   = document.getElementById('overlay-msg');
const btn          = document.getElementById('btn');
const scoreEl      = document.getElementById('score');
const bestEl       = document.getElementById('best');

let snake, dir, nextDir, food, score, best = 0, loop, paused = false, alive = false;

const UP = [0,-1], DOWN = [0,1], LEFT = [-1,0], RIGHT = [1,0];

function opposite(a, b) { return a[0] === -b[0] && a[1] === -b[1]; }

function randomFood() {
  const set = new Set(snake.map(([x,y]) => `${x},${y}`));
  let pos;
  do { pos = [Math.floor(Math.random()*COLS), Math.floor(Math.random()*ROWS)]; }
  while (set.has(`${pos[0]},${pos[1]}`));
  return pos;
}

function startGame() {
  snake   = [[Math.floor(COLS/2), Math.floor(ROWS/2)]];
  dir     = RIGHT;
  nextDir = RIGHT;
  food    = randomFood();
  score   = 0;
  paused  = false;
  alive   = true;
  scoreEl.textContent = 0;
  overlay.classList.add('hidden');
  clearInterval(loop);
  loop = setInterval(tick, 100);
}

function endGame() {
  alive = false;
  clearInterval(loop);
  if (score > best) { best = score; bestEl.textContent = best; }
  overlayTitle.textContent = 'GAME OVER';
  overlayMsg.textContent   = `Score: ${score}`;
  btn.textContent          = 'PLAY AGAIN';
  overlay.classList.remove('hidden');
}

function tick() {
  dir = nextDir;
  const head = [snake[0][0] + dir[0], snake[0][1] + dir[1]];

  if (head[0] < 0 || head[0] >= COLS || head[1] < 0 || head[1] >= ROWS) return endGame();
  if (snake.some(([x,y]) => x === head[0] && y === head[1])) return endGame();

  snake.unshift(head);
  if (head[0] === food[0] && head[1] === food[1]) {
    score += 10;
    scoreEl.textContent = score;
    food = randomFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*TILE,0); ctx.lineTo(x*TILE,canvas.height); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*TILE); ctx.lineTo(canvas.width,y*TILE); ctx.stroke(); }

  // Snake
  snake.forEach(([x,y], i) => {
    const isHead = i === 0;
    ctx.fillStyle = isHead ? '#1e8c1e' : '#32c832';
    roundRect(ctx, x*TILE+1, y*TILE+1, TILE-2, TILE-2, 4);
    ctx.fill();
    if (!isHead) {
      ctx.fillStyle = '#1e8c1e';
      roundRect(ctx, x*TILE+5, y*TILE+5, TILE-10, TILE-10, 2);
      ctx.fill();
    }
  });

  // Food
  const [fx, fy] = food;
  const cx = fx*TILE + TILE/2, cy = fy*TILE + TILE/2;
  ctx.fillStyle = '#dc3232';
  ctx.beginPath(); ctx.arc(cx, cy, TILE/2-3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ffdc00';
  ctx.beginPath(); ctx.arc(cx, cy, TILE/4, 0, Math.PI*2); ctx.fill();
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: UP, w: UP, W: UP,
    ArrowDown: DOWN, s: DOWN, S: DOWN,
    ArrowLeft: LEFT, a: LEFT, A: LEFT,
    ArrowRight: RIGHT, d: RIGHT, D: RIGHT,
  };
  if (map[e.key] && !opposite(map[e.key], dir)) {
    nextDir = map[e.key];
    e.preventDefault();
  }
  if (e.key === 'Escape' && alive) {
    paused = !paused;
    if (paused) { clearInterval(loop); }
    else { loop = setInterval(tick, 100); }
  }
  if (e.key === ' ' && !alive) startGame();
});

btn.addEventListener('click', startGame);

// Initial draw
ctx.fillStyle = '#0a0a0a';
ctx.fillRect(0, 0, canvas.width, canvas.height);
</script>
</body>
</html>
